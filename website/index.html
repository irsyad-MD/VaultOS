<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #09090b; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .logo { font-size: 2.5rem; font-weight: 800; color: #6366f1; letter-spacing: -1px; margin-bottom: 8px; }
    .sub { font-size: 1rem; color: #71717a; margin-bottom: 40px; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 32px; max-width: 400px; width: 100%; text-align: center; }
    .card h2 { font-size: 1.2rem; margin-bottom: 12px; }
    .card p { color: #a1a1aa; font-size: 0.9rem; line-height: 1.6; }
    .watermark { margin-top: 48px; font-size: 0.75rem; color: #3f3f46; font-style: italic; }
  </style>
</head>
<body>
  <div class="logo">VaultOS</div>
  <div class="sub">Personal Finance Operating System</div>
  <div class="card">
    <h2>📱 Buka di Aplikasi</h2>
    <p>VaultOS tersedia sebagai aplikasi mobile.<br/>Jika kamu baru mendaftar, cek email untuk link verifikasi.</p>
  </div>
  <div class="watermark">by ImsyadDeveloper</div>
</body>
</html>
